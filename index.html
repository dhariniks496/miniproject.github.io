<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }
    .card {
      width: 360px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 20px; }
    .search {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2196F3;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #1976D2; }
    .weather { display: none; margin-top: 20px; }
    .emoji { font-size: 70px; }
    .temp { font-size: 42px; font-weight: bold; color: #222; }
    .city { font-size: 28px; margin: 10px 0; }
    .desc { color: #666; text-transform: capitalize; }
    .error { color: red; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Weather App</h1>
    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button onclick="getWeather()">Search</button>
    </div>
    <p class="error" id="error">City not found</p>

    <div class="weather" id="weatherBox">
      <div class="emoji" id="weatherEmoji">☀️</div>
      <div class="temp" id="temp">--°C</div>
      <div class="city" id="city">City</div>
      <div class="desc" id="desc">Description</div>
    </div>
  </div>

  <script>
    const apiKey = 'YOUR_API_KEY';

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      const error = document.getElementById('error');
      const weatherBox = document.getElementById('weatherBox');

      if (!city) return;

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.cod !== 200) throw new Error();

        document.getElementById('temp').innerText = Math.round(data.main.temp) + '°C';
        document.getElementById('city').innerText = data.name;
        document.getElementById('desc').innerText = data.weather[0].description;

        const condition = data.weather[0].main;
        let emoji = '☀️';
        if (condition === 'Clouds') emoji = '☁️';
        if (condition === 'Rain') emoji = '🌧️';
        if (condition === 'Thunderstorm') emoji = '⛈️';
        if (condition === 'Snow') emoji = '❄️';
        document.getElementById('weatherEmoji').innerText = emoji;

        error.style.display = 'none';
        weatherBox.style.display = 'block';
      } catch {
        error.style.display = 'block';
        weatherBox.style.display = 'none';
      }
    }

    document.getElementById('cityInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') getWeather();
    });
  </script>
</body>
</html>
