<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Weather Predictor</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#89f7fe,#66a6ff);
      transition: 0.5s;
    }
    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:360px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }
    h1{margin-bottom:20px;color:#333;}
    input{
      width:100%;
      padding:12px;
      border:2px solid #ddd;
      border-radius:10px;
      margin:15px 0;
      font-size:16px;
    }
    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      background:#2196F3;
      color:white;
    }
    button:hover{background:#1976D2;}
    #emoji{font-size:80px;margin:20px 0;}
    #result{font-size:28px;font-weight:bold;color:#333;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Weather Predictor</h1>
    <p>Enter temperature (°C):</p>
    <input type="number" id="tempInput" placeholder="Example: 28">
    <button onclick="predictWeather()">Predict</button>
    <div id="emoji">❔</div>
    <div id="result">Enter temperature</div>
  </div>

  <script>
    const input = document.getElementById('tempInput');

    function predictWeather(){
      const temp = parseFloat(input.value);
      const emoji = document.getElementById('emoji');
      const result = document.getElementById('result');
      const body = document.body;

      if(isNaN(temp)){
        result.innerText = 'Enter valid number';
        emoji.innerText = '⚠️';
      } else if(temp >= 30){
        emoji.innerText = '☀️';
        result.innerText = 'Sunny';
        body.style.background = 'linear-gradient(135deg, #f6d365, #fda085)';
      } else if(temp >= 20){
        emoji.innerText = '☁️';
        result.innerText = 'Cloudy';
        body.style.background = 'linear-gradient(135deg, #bdc3c7, #2c3e50)';
      } else if(temp < 0){
        emoji.innerText = '❄️';
        result.innerText = 'Snowy';
        body.style.background = 'linear-gradient(135deg, #e6f7ff, #b3d9ff)';
      } else {
        emoji.innerText = '🌧️';
        result.innerText = 'Rainy';
        body.style.background = 'linear-gradient(135deg, #4facfe, #003973)';
      }

      input.value = '';
      input.focus();
    }

    input.addEventListener('keypress', function(e){
      if(e.key === 'Enter') predictWeather();
    });
  </script>
</body>
</html>
